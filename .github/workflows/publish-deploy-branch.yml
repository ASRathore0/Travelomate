name: Publish deploy branch

on:
  push:
    branches: ["main", "master"]

concurrency:
  group: publish-deploy-branch
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish dist to deploy branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --quiet refs/heads/deploy; then
            git worktree add deploy-worktree deploy
          else
            git worktree add -B deploy deploy-worktree
          fi

          rm -rf deploy-worktree/*
          cp -R dist/* deploy-worktree/

          cd deploy-worktree
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Publish dist"
          git push origin deploy
