<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travelomate</title>
    <script>
      (function () {
        var path = location.pathname + location.search + location.hash;
        var redirectUrl = '/?/' + path.replace(/^\//, '');
        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
